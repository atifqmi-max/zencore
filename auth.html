<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynsta - Login & Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            max-width: 450px;
            width: 90%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .auth-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            background: white;
        }

        .auth-body {
            padding: 30px;
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 500;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-google {
            background: white;
            color: #757575;
            border: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }

        .btn-google i {
            color: #DB4437;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e9ecef;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #6c757d;
            font-size: 0.9em;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 5px;
            text-align: center;
            display: none;
        }

        .success-message {
            color: #28a745;
            font-size: 0.9em;
            margin-top: 5px;
            text-align: center;
            display: none;
        }

        .admin-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9em;
            display: none;
        }

        .admin-badge.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Zynsta</h1>
            <p>Connect with the world</p>
        </div>
        
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" onclick="switchTab('register')">Register</div>
        </div>
        
        <div class="auth-body">
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button class="btn btn-google" onclick="handleGoogleLogin()">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
                
                <div id="loginError" class="error-message"></div>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="regPhone">Phone Number (Optional)</label>
                    <input type="text" id="regPhone" placeholder="Enter your phone number">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Register</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>
                
                <button class="btn btn-google" onclick="handleGoogleLogin()">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
                
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>
            </div>
        </div>
    </div>
    
    <div class="admin-badge" id="adminBadge">
        <i class="fas fa-shield-alt"></i> Admin Mode Active
    </div>

    <script>
        // Admin credentials
        const ADMIN_EMAIL = 'atifqmi@gmail.com';
        const ADMIN_PASSWORD = 'kistan**1';
        
        // Switch between login and register tabs
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            // Clear error messages
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        }
        
        // Handle login
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorElement = document.getElementById('loginError');
            
            if (!email || !password) {
                errorElement.textContent = 'Please fill in all fields';
                errorElement.style.display = 'block';
                return;
            }
            
            // Check if admin
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                const adminUser = {
                    id: 'admin_' + Date.now(),
                    name: 'Admin User',
                    email: email,
                    username: 'admin',
                    isAdmin: true,
                    avatar: 'https://via.placeholder.com/150',
                    bio: 'Administrator',
                    followers: 0,
                    following: 0,
                    posts: 0,
                    verified: true,
                    joinDate: new Date().toISOString()
                };
                
                // Save user session
                localStorage.setItem('zynsta_current_user', JSON.stringify(adminUser));
                
                // Show admin badge
                document.getElementById('adminBadge').classList.add('active');
                
                // Redirect to admin panel
                window.location.href = 'admin.html';
                return;
            }
            
            // Check if user exists in localStorage
            const users = JSON.parse(localStorage.getItem('zynsta_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Save user session
                localStorage.setItem('zynsta_current_user', JSON.stringify(user));
                
                // Redirect to homepage
                window.location.href = 'homepage.html';
            } else {
                errorElement.textContent = 'Invalid email or password';
                errorElement.style.display = 'block';
            }
        }
        
        // Handle register
        function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value;
            
            const errorElement = document.getElementById('registerError');
            const successElement = document.getElementById('registerSuccess');
            
            if (!name || !email || !username || !password) {
                errorElement.textContent = 'Please fill in all required fields';
                errorElement.style.display = 'block';
                successElement.style.display = 'none';
                return;
            }
            
            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('zynsta_users') || '[]');
            
            if (users.some(u => u.email === email)) {
                errorElement.textContent = 'Email already registered';
                errorElement.style.display = 'block';
                successElement.style.display = 'none';
                return;
            }
            
            if (users.some(u => u.username === username)) {
                errorElement.textContent = 'Username already taken';
                errorElement.style.display = 'block';
                successElement.style.display = 'none';
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                username: username,
                password: password,
                phone: phone || '',
                isAdmin: false,
                verified: false,
                avatar: 'https://via.placeholder.com/150',
                bio: 'Hey there! I am using Zynsta',
                website: '',
                followers: 0,
                following: 0,
                posts: 0,
                balance: 0,
                joinDate: new Date().toISOString(),
                lastUsernameChange: null,
                lastNameChange: null
            };
            
            // Add to users list
            users.push(newUser);
            localStorage.setItem('zynsta_users', JSON.stringify(users));
            
            // Save user session
            localStorage.setItem('zynsta_current_user', JSON.stringify(newUser));
            
            // Show success message
            successElement.textContent = 'Registration successful! Redirecting...';
            successElement.style.display = 'block';
            errorElement.style.display = 'none';
            
            // Redirect to homepage
            setTimeout(() => {
                window.location.href = 'homepage.html';
            }, 1500);
        }
        
        // Handle Google login
        function handleGoogleLogin() {
            // Simulate Google login
            const googleEmail = 'user' + Math.floor(Math.random() * 1000) + '@gmail.com';
            const googleUser = {
                id: 'google_' + Date.now(),
                name: 'Google User',
                email: googleEmail,
                username: 'google_user_' + Math.floor(Math.random() * 1000),
                isAdmin: false,
                verified: false,
                avatar: 'https://via.placeholder.com/150',
                bio: 'Hey there! I am using Zynsta',
                website: '',
                followers: 0,
                following: 0,
                posts: 0,
                balance: 0,
                joinDate: new Date().toISOString()
            };
            
            // Save to users list
            const users = JSON.parse(localStorage.getItem('zynsta_users') || '[]');
            users.push(googleUser);
            localStorage.setItem('zynsta_users', JSON.stringify(users));
            
            // Save user session
            localStorage.setItem('zynsta_current_user', JSON.stringify(googleUser));
            
            // Redirect to homepage
            window.location.href = 'homepage.html';
        }
        
        // Check if already logged in
        window.onload = function() {
            const savedUser = localStorage.getItem('zynsta_current_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                if (user.isAdmin) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'homepage.html';
                }
            }
        };
    </script>
</body>
</html>
