<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynsta - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Previous styles remain the same until Create Post Modal */
        
        /* Create Post Modal - Updated */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 500px;
            border-radius: 20px;
            overflow: hidden;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2em;
        }

        .modal-header i {
            font-size: 1.5em;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #dbdbdb;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #0095f6;
            background: #f8f9fa;
        }

        .upload-area i {
            font-size: 3em;
            color: #0095f6;
            margin-bottom: 10px;
        }

        .upload-area p {
            color: #8e8e8e;
            margin-bottom: 15px;
        }

        .upload-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .upload-btn:hover {
            background: #1877f2;
        }

        /* Preview Area */
        .preview-area {
            display: none;
        }

        .preview-area.active {
            display: block;
        }

        .preview-media {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .caption-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            margin-bottom: 15px;
            resize: none;
            font-family: inherit;
        }

        .caption-input:focus {
            outline: none;
            border-color: #0095f6;
        }

        .share-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .share-option {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .share-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .post-actions {
            display: flex;
            gap: 10px;
        }

        .post-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #0095f6;
            color: white;
        }

        .btn-secondary {
            background: #efefef;
            color: #262626;
        }

        /* Progress Bar */
        .upload-progress {
            margin-top: 15px;
            display: none;
        }

        .upload-progress.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #efefef;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #0095f6;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            margin-top: 5px;
            font-size: 0.9em;
            color: #8e8e8e;
        }

        /* File Input */
        .file-input {
            display: none;
        }

        /* Profile Picture Upload */
        .profile-upload {
            position: relative;
            display: inline-block;
        }

        .profile-upload:hover .upload-overlay {
            opacity: 1;
        }

        .upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        .upload-overlay i {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <!-- Previous HTML remains the same until Create Modal -->

    <!-- Create Post Modal -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Create new post</h3>
                <i class="fas fa-times" onclick="closeCreateModal()"></i>
            </div>
            <div class="modal-body">
                <!-- Upload Area -->
                <div id="uploadArea" class="upload-area">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Drag photos and videos here</p>
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        Select from computer
                    </button>
                </div>
                
                <!-- Preview Area -->
                <div id="previewArea" class="preview-area">
                    <img id="previewImage" class="preview-media" src="" alt="Preview" style="display: none;">
                    <video id="previewVideo" class="preview-media" controls style="display: none;"></video>
                    
                    <textarea id="caption" class="caption-input" placeholder="Write a caption..."></textarea>
                    
                    <div class="share-options">
                        <label class="share-option">
                            <input type="checkbox" id="shareToFeed" checked> Share to Feed
                        </label>
                        <label class="share-option">
                            <input type="checkbox" id="shareToReels"> Share to Reels
                        </label>
                        <label class="share-option">
                            <input type="checkbox" id="shareToStory"> Share to Story
                        </label>
                    </div>
                    
                    <div class="post-actions">
                        <button class="btn-secondary" onclick="resetUpload()">Cancel</button>
                        <button class="btn-primary" onclick="uploadPost()">Share</button>
                    </div>
                </div>
                
                <!-- Progress Bar -->
                <div id="uploadProgress" class="upload-progress">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <div id="progressText" class="progress-text">Uploading... 0%</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" class="file-input" accept="image/*,video/*" onchange="handleFileSelect(this)">

    <script>
        // Previous JavaScript remains the same until openCreateModal function

        // Create modal functions
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
            resetUpload();
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            resetUpload();
        }

        // Handle file selection
        function handleFileSelect(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const fileType = file.type.split('/')[0];
                
                // Show preview
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('previewArea').classList.add('active');
                
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    if (fileType === 'image') {
                        const preview = document.getElementById('previewImage');
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                        document.getElementById('previewVideo').style.display = 'none';
                    } else if (fileType === 'video') {
                        const preview = document.getElementById('previewVideo');
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                        document.getElementById('previewImage').style.display = 'none';
                    }
                };
                
                reader.readAsDataURL(file);
                
                // Store file for later upload
                window.selectedFile = file;
            }
        }

        // Reset upload
        function resetUpload() {
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('previewArea').classList.remove('active');
            document.getElementById('uploadProgress').classList.remove('active');
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewVideo').style.display = 'none';
            document.getElementById('caption').value = '';
            document.getElementById('fileInput').value = '';
            window.selectedFile = null;
        }

        // Upload post
        function uploadPost() {
            if (!window.selectedFile) {
                alert('Please select a file first');
                return;
            }
            
            const caption = document.getElementById('caption').value;
            const shareToFeed = document.getElementById('shareToFeed').checked;
            const shareToReels = document.getElementById('shareToReels').checked;
            const shareToStory = document.getElementById('shareToStory').checked;
            
            // Show progress
            document.getElementById('uploadProgress').classList.add('active');
            
            // Simulate upload progress
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = `Uploading... ${progress}%`;
                
                if (progress >= 100) {
                    clearInterval(interval);
                    
                    // Save post to localStorage
                    savePost(window.selectedFile, caption, shareToFeed, shareToReels, shareToStory);
                    
                    setTimeout(() => {
                        alert('Post uploaded successfully!');
                        closeCreateModal();
                        
                        // Refresh feed if needed
                        if (shareToFeed) {
                            loadPosts(); // Reload posts
                        }
                    }, 500);
                }
            }, 200);
        }

        // Save post to localStorage
        function savePost(file, caption, toFeed, toReels, toStory) {
            const currentUser = JSON.parse(localStorage.getItem('zynsta_current_user') || '{}');
            
            if (!currentUser.id) return;
            
            const posts = JSON.parse(localStorage.getItem('zynsta_posts') || '[]');
            
            const newPost = {
                id: Date.now(),
                userId: currentUser.id,
                username: currentUser.username,
                userAvatar: currentUser.avatar || 'https://via.placeholder.com/32',
                caption: caption,
                time: 'Just now',
                likes: 0,
                comments: 0,
                type: file.type.split('/')[0],
                // In a real app, you would upload to server and get URL
                mediaUrl: URL.createObjectURL(file),
                toFeed: toFeed,
                toReels: toReels,
                toStory: toStory,
                timestamp: new Date().toISOString()
            };
            
            posts.unshift(newPost);
            localStorage.setItem('zynsta_posts', JSON.stringify(posts));
            
            // Update user post count
            if (toFeed || toReels) {
                currentUser.posts = (currentUser.posts || 0) + 1;
                localStorage.setItem('zynsta_current_user', JSON.stringify(currentUser));
            }
        }

        // Modified loadPosts function to load from localStorage
        function loadPosts() {
            const container = document.getElementById('feedPosts');
            const posts = JSON.parse(localStorage.getItem('zynsta_posts') || '[]');
            
            // Filter only feed posts
            const feedPosts = posts.filter(p => p.toFeed);
            
            if (feedPosts.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #8e8e8e;">
                        <i class="fas fa-camera" style="font-size: 3em; margin-bottom: 15px;"></i>
                        <h3>No posts yet</h3>
                        <p>When you upload posts, they'll show up here</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            feedPosts.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'feed-post';
                
                postElement.innerHTML = `
                    <div class="post-header">
                        <img src="${post.userAvatar}" alt="${post.username}">
                        <div class="post-header-info">
                            <a href="#" class="post-username">${post.username}</a>
                            <div class="post-location">${post.location || ''}</div>
                        </div>
                        <i class="fas fa-ellipsis-h post-more"></i>
                    </div>
                    
                    ${post.type === 'image' ? 
                        `<img src="${post.mediaUrl}" alt="Post" class="post-media">` : 
                        `<video src="${post.mediaUrl}" class="post-media" controls></video>`
                    }
                    
                    <div class="post-actions">
                        <i class="far fa-heart post-action" onclick="toggleLike(this)"></i>
                        <i class="far fa-comment post-action" onclick="focusComment(this)"></i>
                        <i class="far fa-paper-plane post-action"></i>
                        <i class="far fa-bookmark post-action post-action-right" onclick="toggleSave(this)"></i>
                    </div>
                    
                    <div class="post-likes">${post.likes.toLocaleString()} likes</div>
                    
                    <div class="post-caption">
                        <strong>${post.username}</strong> ${post.caption}
                    </div>
                    
                    <div class="post-comments" onclick="showComments(${post.id})">
                        View all ${post.comments} comments
                    </div>
                    
                    <div class="post-time">${post.time}</div>
                    
                    <div class="add-comment">
                        <input type="text" placeholder="Add a comment..." onkeyup="checkComment(this)">
                        <button onclick="addComment(this)">Post</button>
                    </div>
                `;
                
                container.appendChild(postElement);
            });
        }

        // Initialize page
        window.onload = function() {
            loadStories();
            loadVideos();
            loadPosts();
            loadUserProfile();
            loadSuggestions();
        };
    </script>
</body>
</html>
