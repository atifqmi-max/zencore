<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynsta - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fafafa;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #dbdbdb;
            padding: 0 20px;
            z-index: 1000;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-left h1 {
            font-size: 1.8em;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-search {
            flex: 1;
            max-width: 400px;
            margin: 0 20px;
            position: relative;
        }

        .nav-search input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            background: #fafafa;
            font-size: 0.9em;
        }

        .nav-search input:focus {
            outline: none;
            border-color: #b3b3b3;
            background: white;
        }

        .nav-search i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .nav-icon {
            font-size: 1.5em;
            color: #262626;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .nav-icon:hover {
            transform: scale(1.1);
        }

        .nav-icon.active {
            color: #0095f6;
        }

        .profile-pic-small {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .profile-pic-small:hover {
            border-color: #0095f6;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 80px auto 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            padding: 0 20px;
        }

        /* Stories Section */
        .stories-section {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .stories-container {
            display: flex;
            gap: 20px;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 80px;
        }

        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            margin-bottom: 5px;
        }

        .story-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }

        .story-username {
            font-size: 0.8em;
            color: #262626;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Feed Posts */
        .feed-post {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
        }

        .post-header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .post-header-info {
            flex: 1;
        }

        .post-username {
            font-weight: 600;
            color: #262626;
            text-decoration: none;
        }

        .post-location {
            font-size: 0.8em;
            color: #8e8e8e;
        }

        .post-more {
            color: #262626;
            cursor: pointer;
        }

        .post-media {
            width: 100%;
            max-height: 600px;
            object-fit: cover;
            background: black;
        }

        .post-actions {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 16px;
        }

        .post-action {
            font-size: 1.5em;
            color: #262626;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .post-action:hover {
            transform: scale(1.1);
        }

        .post-action.liked {
            color: #ed4956;
        }

        .post-action.saved {
            color: #0095f6;
        }

        .post-action-right {
            margin-left: auto;
        }

        .post-likes {
            font-weight: 600;
            padding: 0 16px;
            margin-bottom: 8px;
        }

        .post-caption {
            padding: 0 16px;
            margin-bottom: 8px;
        }

        .post-caption strong {
            margin-right: 5px;
        }

        .post-comments {
            color: #8e8e8e;
            padding: 0 16px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .post-time {
            color: #8e8e8e;
            font-size: 0.7em;
            padding: 0 16px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .add-comment {
            display: flex;
            align-items: center;
            padding: 16px;
            border-top: 1px solid #efefef;
        }

        .add-comment input {
            flex: 1;
            border: none;
            outline: none;
            padding: 5px;
            font-size: 0.9em;
        }

        .add-comment button {
            background: none;
            border: none;
            color: #0095f6;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
        }

        .add-comment button.active {
            opacity: 1;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        .user-profile {
            display: flex;
            align-items: center;
            padding: 20px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-profile img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-info h4 {
            font-size: 0.9em;
            margin-bottom: 2px;
        }

        .user-info p {
            color: #8e8e8e;
            font-size: 0.8em;
        }

        .switch-btn {
            color: #0095f6;
            font-weight: 600;
            font-size: 0.8em;
            cursor: pointer;
        }

        .suggestions {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 20px;
        }

        .suggestions-header {
            display: flex;
            justify-content: space-between;
            color: #8e8e8e;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .suggestion-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }

        .suggestion-info {
            flex: 1;
        }

        .suggestion-info h5 {
            font-size: 0.9em;
            margin-bottom: 2px;
        }

        .suggestion-info p {
            color: #8e8e8e;
            font-size: 0.7em;
        }

        .follow-btn {
            color: #0095f6;
            font-weight: 600;
            font-size: 0.8em;
            cursor: pointer;
        }

        /* For You Videos */
        .for-you-section {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 20px;
        }

        .for-you-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .for-you-header i {
            font-size: 1.5em;
            color: #ff3b5c;
        }

        .for-you-header h2 {
            font-size: 1.2em;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .video-item {
            position: relative;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .video-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-stats {
            position: absolute;
            bottom: 5px;
            left: 5px;
            color: white;
            font-size: 0.7em;
            display: flex;
            gap: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .video-stats i {
            margin-right: 3px;
        }

        /* Story Viewer Modal */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .story-modal.active {
            display: flex;
        }

        .story-viewer {
            width: 400px;
            height: 700px;
            background: #000;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .story-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            color: white;
            z-index: 10;
        }

        .story-progress {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
        }

        .progress-bar {
            height: 2px;
            background: rgba(255,255,255,0.3);
            flex: 1;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: white;
            animation: progress 5s linear;
        }

        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }

        .story-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 10;
        }

        .story-content {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .nav-search {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-left">
            <h1 onclick="window.location.href='homepage.html'">Zynsta</h1>
        </div>
        
        <div class="nav-search">
            <input type="text" placeholder="Search" onfocus="window.location.href='search.html'">
            <i class="fas fa-search"></i>
        </div>
        
        <div class="nav-right">
            <i class="fas fa-home nav-icon active" onclick="window.location.href='homepage.html'"></i>
            <i class="fab fa-facebook-messenger nav-icon" onclick="window.location.href='chats.html'"></i>
            <i class="fas fa-plus-square nav-icon" onclick="openCreateModal()"></i>
            <i class="fas fa-compass nav-icon" onclick="window.location.href='search.html'"></i>
            <i class="fas fa-heart nav-icon" onclick="window.location.href='activity.html'"></i>
            <img src="https://via.placeholder.com/28" alt="Profile" class="profile-pic-small" onclick="window.location.href='profile.html'">
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Column -->
        <div class="left-column">
            <!-- Stories Section -->
            <div class="stories-section">
                <div class="stories-container" id="storiesContainer">
                    <!-- Stories will be loaded here dynamically -->
                </div>
            </div>

            <!-- For You Videos -->
            <div class="for-you-section">
                <div class="for-you-header">
                    <i class="fas fa-play-circle"></i>
                    <h2>For You</h2>
                </div>
                <div class="video-grid" id="videoGrid">
                    <!-- Videos will be loaded here dynamically -->
                </div>
            </div>

            <!-- Feed Posts -->
            <div id="feedPosts">
                <!-- Posts will be loaded here dynamically -->
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- User Profile -->
            <div class="user-profile" id="userProfile">
                <!-- User profile will be loaded here -->
            </div>

            <!-- Suggestions -->
            <div class="suggestions">
                <div class="suggestions-header">
                    <span>Suggestions For You</span>
                    <span class="switch-btn">See All</span>
                </div>
                <div id="suggestionsList">
                    <!-- Suggestions will be loaded here -->
                </div>
            </div>

            <!-- Footer Links -->
            <div style="margin-top: 20px; font-size: 0.7em; color: #c7c7c7;">
                About · Help · Press · API · Jobs · Privacy · Terms · Locations · Language
                <br>
                © 2024 ZYNSTA FROM META
            </div>
        </div>
    </div>

    <!-- Story Viewer Modal -->
    <div class="story-modal" id="storyModal">
        <div class="story-viewer">
            <div class="story-progress" id="storyProgress"></div>
            <div class="story-header">
                <img src="https://via.placeholder.com/32" alt="" style="width: 32px; height: 32px; border-radius: 50%; margin-right: 10px;">
                <div>
                    <strong style="color: white;">username</strong>
                    <span style="color: rgba(255,255,255,0.8); font-size: 0.8em; margin-left: 10px;">1h</span>
                </div>
            </div>
            <i class="fas fa-times story-close" onclick="closeStory()"></i>
            <img src="" alt="Story" class="story-content" id="storyContent">
        </div>
    </div>

    <!-- Create Post Modal -->
    <div class="story-modal" id="createModal">
        <div style="background: white; width: 500px; border-radius: 20px; padding: 20px;">
            <h3 style="text-align: center; margin-bottom: 20px;">Create new post</h3>
            <div style="border: 2px dashed #dbdbdb; border-radius: 10px; padding: 40px; text-align: center;">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3em; color: #0095f6; margin-bottom: 10px;"></i>
                <p>Drag photos and videos here</p>
                <button style="background: #0095f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; cursor: pointer;">Select from computer</button>
            </div>
        </div>
    </div>

    <script>
        // Current user data
        let currentUser = JSON.parse(localStorage.getItem('zynsta_current_user')) || {
            username: 'guest_user',
            name: 'Guest User',
            avatar: 'https://via.placeholder.com/56'
        };

        // Sample data for stories
        const stories = [
            { id: 1, username: 'your_story', avatar: 'https://via.placeholder.com/70', hasStory: true, isUser: true },
            { id: 2, username: 'john_doe', avatar: 'https://via.placeholder.com/70', hasStory: true },
            { id: 3, username: 'jane_smith', avatar: 'https://via.placeholder.com/70', hasStory: true },
            { id: 4, username: 'travel_blog', avatar: 'https://via.placeholder.com/70', hasStory: false },
            { id: 5, username: 'food_lover', avatar: 'https://via.placeholder.com/70', hasStory: true },
            { id: 6, username: 'fitness_guru', avatar: 'https://via.placeholder.com/70', hasStory: true },
        ];

        // Sample videos for "For You" section
        const videos = [
            { id: 1, thumbnail: 'https://via.placeholder.com/300x533', views: '1.2M', likes: '45K' },
            { id: 2, thumbnail: 'https://via.placeholder.com/300x533', views: '890K', likes: '32K' },
            { id: 3, thumbnail: 'https://via.placeholder.com/300x533', views: '2.1M', likes: '78K' },
            { id: 4, thumbnail: 'https://via.placeholder.com/300x533', views: '567K', likes: '23K' },
            { id: 5, thumbnail: 'https://via.placeholder.com/300x533', views: '1.5M', likes: '56K' },
            { id: 6, thumbnail: 'https://via.placeholder.com/300x533', views: '3.2M', likes: '123K' },
        ];

        // Sample posts
        const posts = [
            {
                id: 1,
                username: 'john_doe',
                avatar: 'https://via.placeholder.com/32',
                location: 'New York',
                image: 'https://via.placeholder.com/600x600',
                likes: 1234,
                caption: 'Beautiful day in the city! 🌆',
                comments: 89,
                time: '2 HOURS AGO'
            },
            {
                id: 2,
                username: 'jane_smith',
                avatar: 'https://via.placeholder.com/32',
                location: 'Paris',
                image: 'https://via.placeholder.com/600x600',
                likes: 2341,
                caption: 'Love this place! 🗼',
                comments: 156,
                time: '5 HOURS AGO'
            }
        ];
 // Sample suggestions
        const suggestions = [
            { id: 1, username: 'photo_artist', name: 'Photo Artist', avatar: 'https://via.placeholder.com/40' },
            { id: 2, username: 'music_pro', name: 'Music Pro', avatar: 'https://via.placeholder.com/40' },
            { id: 3, username: 'tech_review', name: 'Tech Reviews', avatar: 'https://via.placeholder.com/40' },
            { id: 4, username: 'fashion_blog', name: 'Fashion Blog', avatar: 'https://via.placeholder.com/40' },
            { id: 5, username: 'fitness_coach', name: 'Fitness Coach', avatar: 'https://via.placeholder.com/40' },
        ];

        // Load stories
        function loadStories() {
            const container = document.getElementById('storiesContainer');
            container.innerHTML = '';
            
            stories.forEach(story => {
                const storyElement = document.createElement('div');
                storyElement.className = 'story-item';
                storyElement.onclick = () => openStory(story);
                
                storyElement.innerHTML = `
                    <div class="story-ring" style="background: ${story.hasStory ? 'linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888)' : '#dbdbdb'}">
                        <img src="${story.avatar}" alt="${story.username}" class="story-avatar">
                    </div>
                    <span class="story-username">${story.username}</span>
                `;
                
                container.appendChild(storyElement);
            });
        }

        // Load videos
        function loadVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            videos.forEach(video => {
                const videoElement = document.createElement('div');
                videoElement.className = 'video-item';
                videoElement.onclick = () => window.location.href = 'reels.html';
                
                videoElement.innerHTML = `
                    <img src="${video.thumbnail}" alt="Video thumbnail">
                    <div class="video-stats">
                        <span><i class="fas fa-play"></i> ${video.views}</span>
                        <span><i class="fas fa-heart"></i> ${video.likes}</span>
                    </div>
                `;
                
                grid.appendChild(videoElement);
            });
        }

        // Load posts
        function loadPosts() {
            const container = document.getElementById('feedPosts');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'feed-post';
                
                postElement.innerHTML = `
                    <div class="post-header">
                        <img src="${post.avatar}" alt="${post.username}">
                        <div class="post-header-info">
                            <a href="#" class="post-username">${post.username}</a>
                            <div class="post-location">${post.location}</div>
                        </div>
                        <i class="fas fa-ellipsis-h post-more"></i>
                    </div>
                    
                    <img src="${post.image}" alt="Post" class="post-media">
                    
                    <div class="post-actions">
                        <i class="far fa-heart post-action" onclick="toggleLike(this)"></i>
                        <i class="far fa-comment post-action" onclick="focusComment(this)"></i>
                        <i class="far fa-paper-plane post-action"></i>
                        <i class="far fa-bookmark post-action post-action-right" onclick="toggleSave(this)"></i>
                    </div>
                    
                    <div class="post-likes">${post.likes.toLocaleString()} likes</div>
                    
                    <div class="post-caption">
                        <strong>${post.username}</strong> ${post.caption}
                    </div>
                    
                    <div class="post-comments" onclick="showComments(${post.id})">
                        View all ${post.comments} comments
                    </div>
                    
                    <div class="post-time">${post.time}</div>
                    
                    <div class="add-comment">
                        <input type="text" placeholder="Add a comment..." onkeyup="checkComment(this)">
                        <button onclick="addComment(this)">Post</button>
                    </div>
                `;
                
                container.appendChild(postElement);
            });
        }

        // Load user profile in sidebar
        function loadUserProfile() {
            const profileDiv = document.getElementById('userProfile');
            profileDiv.innerHTML = `
                <img src="${currentUser.avatar || 'https://via.placeholder.com/56'}" alt="${currentUser.username}">
                <div class="user-info">
                    <h4>${currentUser.username}</h4>
                    <p>${currentUser.name}</p>
                </div>
                <div class="switch-btn" onclick="switchAccount()">Switch</div>
            `;
        }

        // Load suggestions
        function loadSuggestions() {
            const list = document.getElementById('suggestionsList');
            list.innerHTML = '';
            
            suggestions.forEach(suggestion => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                
                item.innerHTML = `
                    <img src="${suggestion.avatar}" alt="${suggestion.username}">
                    <div class="suggestion-info">
                        <h5>${suggestion.username}</h5>
                        <p>${suggestion.name}</p>
                    </div>
                    <div class="follow-btn" onclick="followUser(this)">Follow</div>
                `;
                
                list.appendChild(item);
            });
        }

        // Toggle like
        function toggleLike(element) {
            element.classList.toggle('far');
            element.classList.toggle('fas');
            element.classList.toggle('liked');
        }

        // Toggle save
        function toggleSave(element) {
            element.classList.toggle('far');
            element.classList.toggle('fas');
            element.classList.toggle('saved');
        }

        // Check comment input
        function checkComment(input) {
            const button = input.nextElementSibling;
            if (input.value.trim()) {
                button.style.opacity = '1';
            } else {
                button.style.opacity = '0.5';
            }
        }

        // Add comment
        function addComment(button) {
            const input = button.previousElementSibling;
            if (input.value.trim()) {
                alert('Comment added: ' + input.value);
                input.value = '';
                button.style.opacity = '0.5';
            }
        }

        // Focus comment input
        function focusComment(element) {
            const post = element.closest('.feed-post');
            const commentInput = post.querySelector('.add-comment input');
            commentInput.focus();
        }

        // Show comments
        function showComments(postId) {
            alert('Comments feature coming soon!');
        }

        // Follow user
        function followUser(element) {
            element.textContent = element.textContent === 'Follow' ? 'Following' : 'Follow';
        }

        // Switch account
        function switchAccount() {
            alert('Switch account feature coming soon!');
        }

        // Open story
        function openStory(story) {
            const modal = document.getElementById('storyModal');
            const content = document.getElementById('storyContent');
            const progress = document.getElementById('storyProgress');
            
            content.src = story.avatar;
            modal.classList.add('active');
            
            // Create progress bars
            progress.innerHTML = '<div class="progress-bar"><div class="progress-fill"></div></div>';
            
            // Auto close after story ends
            setTimeout(() => {
                closeStory();
            }, 5000);
        }

        // Close story
        function closeStory() {
            document.getElementById('storyModal').classList.remove('active');
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
        }

        // Close create modal
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        // Initialize page
        window.onload = function() {
            loadStories();
            loadVideos();
            loadPosts();
            loadUserProfile();
            loadSuggestions();
        };

        // Close modals on outside click
        window.onclick = function(event) {
            const storyModal = document.getElementById('storyModal');
            const createModal = document.getElementById('createModal');
            
            if (event.target === storyModal) {
                closeStory();
            }
            
            if (event.target === createModal) {
                closeCreateModal();
            }
        };
    </script>
</body>
</html>
