<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynsta - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Previous styles remain the same until profile-avatar section */
        
        .profile-avatar {
            position: relative;
            width: 150px;
            height: 150px;
            cursor: pointer;
        }

        .profile-avatar:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .avatar-overlay i {
            font-size: 2em;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .verified-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: #3897f0;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        /* Hidden file input */
        .file-input {
            display: none;
        }

        /* Rest of the styles remain the same */
    </style>
</head>
<body>
    <!-- Navigation Bar - Same as before -->

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar - Same as before -->

        <!-- Profile Content -->
        <div class="profile-content" id="profileSection">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar" onclick="document.getElementById('avatarInput').click()">
                    <img src="" alt="Profile" id="profileAvatar">
                    <div class="avatar-overlay">
                        <i class="fas fa-camera"></i>
                    </div>
                    <div class="verified-badge" id="verifiedBadge" style="display: none;">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
                
                <!-- Rest of profile header - Same as before -->
            </div>

            <!-- Hidden file input for avatar -->
            <input type="file" id="avatarInput" class="file-input" accept="image/*" onchange="handleAvatarUpload(this)">

            <!-- Rest of profile content - Same as before -->
        </div>
    </div>

    <!-- Edit Profile Modal - Update to include avatar upload -->
    <div class="modal" id="editProfileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <i class="fas fa-times" onclick="closeEditProfile()"></i>
            </div>
            
            <div class="form-group">
                <label>Profile Photo</label>
                <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                    <img src="" alt="" id="editAvatarPreview" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                    <div>
                        <button class="btn-primary" style="width: auto; padding: 8px 20px;" onclick="document.getElementById('editAvatarInput').click()">
                            Change Photo
                        </button>
                        <p style="font-size: 0.8em; color: #8e8e8e; margin-top: 5px;">Click to upload new photo</p>
                    </div>
                </div>
            </div>
            
            <!-- Hidden file input for edit avatar -->
            <input type="file" id="editAvatarInput" class="file-input" accept="image/*" onchange="handleEditAvatarUpload(this)">
            
            <!-- Rest of form fields - Same as before -->
            
            <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>

    <script>
        // Current user data
        let currentUser = JSON.parse(localStorage.getItem('zynsta_current_user')) || {
            id: 1,
            username: 'johndoe',
            name: 'John Doe',
            email: 'john@example.com',
            phone: '',
            avatar: 'https://via.placeholder.com/150',
            bio: 'Travel enthusiast ✈️ | Photography 📸 | Life lover ❤️',
            website: 'www.johndoe.com',
            posts: 42,
            followers: 1234,
            following: 567,
            verified: false,
            joinDate: '2024-01-01',
            lastUsernameChange: null,
            lastNameChange: null
        };

        // Handle avatar upload from profile page
        function handleAvatarUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Check file type
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file');
                    return;
                }
                
                // Check file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert('File size must be less than 5MB');
                    return;
                }
                
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    // Update profile avatar
                    document.getElementById('profileAvatar').src = e.target.result;
                    
                    // Save to user data
                    currentUser.avatar = e.target.result;
                    localStorage.setItem('zynsta_current_user', JSON.stringify(currentUser));
                    
                    // Update users list
                    updateUserInUsersList(currentUser);
                    
                    alert('Profile photo updated successfully!');
                };
                
                reader.readAsDataURL(file);
            }
        }

        // Handle avatar upload from edit profile modal
        function handleEditAvatarUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // Check file type
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file');
                    return;
                }
                
                // Check file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert('File size must be less than 5MB');
                    return;
                }
                
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    // Update preview in edit modal
                    document.getElementById('editAvatarPreview').src = e.target.result;
                    
                    // Store temporarily
                    window.tempAvatar = e.target.result;
                };
                
                reader.readAsDataURL(file);
            }
        }

        // Update user in users list
        function updateUserInUsersList(updatedUser) {
            const users = JSON.parse(localStorage.getItem('zynsta_users') || '[]');
            const index = users.findIndex(u => u.id === updatedUser.id);
            
            if (index !== -1) {
                users[index] = updatedUser;
                localStorage.setItem('zynsta_users', JSON.stringify(users));
            }
        }

        // Modified saveProfile function to include avatar
        function saveProfile() {
            const newName = document.getElementById('editName').value;
            const newUsername = document.getElementById('editUsername').value;
            
            // Check if username changed
            if (newUsername !== currentUser.username) {
                if (!document.getElementById('editUsername').disabled) {
                    currentUser.lastUsernameChange = new Date().toISOString();
                    currentUser.username = newUsername;
                }
            }
            
            // Check if name changed
            if (newName !== currentUser.name) {
                if (!document.getElementById('editName').disabled) {
                    currentUser.lastNameChange = new Date().toISOString();
                    currentUser.name = newName;
                }
            }
            
            // Update avatar if changed
            if (window.tempAvatar) {
                currentUser.avatar = window.tempAvatar;
                document.getElementById('profileAvatar').src = window.tempAvatar;
                window.tempAvatar = null;
            }
            
            currentUser.bio = document.getElementById('editBio').value;
            currentUser.website = document.getElementById('editWebsite').value;
            currentUser.email = document.getElementById('editEmail').value;
            
            // Save to localStorage
            localStorage.setItem('zynsta_current_user', JSON.stringify(currentUser));
            
            // Update in users list
            updateUserInUsersList(currentUser);
            
            // Update profile display
            loadProfile();
            closeEditProfile();
            
            alert('Profile updated successfully!');
        }

        // Modified loadProfile function
        function loadProfile() {
            document.getElementById('profileUsername').textContent = currentUser.username;
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileBioText').textContent = currentUser.bio;
            document.getElementById('profileLink').textContent = currentUser.website;
            document.getElementById('profileLink').href = 'https://' + currentUser.website;
            document.getElementById('profileAvatar').src = currentUser.avatar || 'https://via.placeholder.com/150';
            document.getElementById('postsCount').textContent = currentUser.posts;
            document.getElementById('followersCount').textContent = currentUser.followers.toLocaleString();
            document.getElementById('followingCount').textContent = currentUser.following.toLocaleString();
            
            // Show verified badge if applicable
            if (currentUser.verified) {
                document.getElementById('verifiedBadge').style.display = 'flex';
            } else {
                document.getElementById('verifiedBadge').style.display = 'none';
            }
            
            // Check for auto-verification (1k followers + phone number)
            if (currentUser.followers >= 1000 && currentUser.phone && !currentUser.verified) {
                currentUser.verified = true;
                document.getElementById('verifiedBadge').style.display = 'flex';
                alert('Congratulations! You have been verified! 🎉');
            }
            
            // Load posts
            loadPosts();
            loadReels();
            loadTagged();
            loadAccounts();
        }
        // Modified openEditProfile function
        function openEditProfile() {
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editUsername').value = currentUser.username;
            document.getElementById('editBio').value = currentUser.bio;
            document.getElementById('editWebsite').value = currentUser.website;
            document.getElementById('editEmail').value = currentUser.email;
            document.getElementById('editPhone').value = currentUser.phone || '';
            document.getElementById('editAvatarPreview').src = currentUser.avatar || 'https://via.placeholder.com/80';
            
            // Check cooldowns
            checkCooldowns();
            
            document.getElementById('editProfileModal').classList.add('active');
        }

        // Initialize
        window.onload = function() {
            loadProfile();
        };
    </script>
</body>
</html>
